      <div class="modal-body">
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="fullName" class="form-label fw-bold"><i class="fas fa-user me-1"></i>Full Name</label>
              <input type="text" class="form-control" id="fullName" placeholder="Enter Your Name">
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="email" class="form-label fw-bold"><i class="fas fa-envelope me-1"></i>Email Address</label>
              <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="destination" class="form-label fw-bold"><i class="fas fa-map-marker-alt me-1"></i>Select Destination</label>
              <select class="form-select" id="destination">
                <option value="">Choose Destination</option>
                <option value="goa">Goa Beach Paradise</option>
                <option value="taj">Taj Mahal</option>
                <option value="china">Great Wall of China</option>
                <option value="brazil">Christ the Redeemer</option>
                <option value="mountain">Mountain Adventure</option>
                <option value="tropical">Tropical Escape</option>
              </select>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="travelDate" class="form-label fw-bold"><i class="fas fa-calendar me-1"></i>Travel Date</label>
              <input type="date" class="form-control" id="travelDate">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="travelers" class="form-label fw-bold"><i class="fas fa-users me-1"></i>Number of Travelers</label>
              <select class="form-select" id="travelers">
                <option value="1">1 Person</option>
                <option value="2">2 People</option>
                <option value="3">3 People</option>
                <option value="4">4 People</option>
                <option value="5">5+ People</option>
              </select>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="phone" class="form-label fw-bold"><i class="fas fa-phone me-1"></i>Phone Number</label>
              <input type="tel" class="form-control" id="phone" placeholder="+91 XXXXX XXXXX">
            </div>
          </div>
        </div>
        <div class="mb-3">
          <label for="specialRequests" class="form-label fw-bold"><i class="fas fa-comment me-1"></i>Special Requests</label>
          <textarea class="form-control" id="specialRequests" rows="3" placeholder="Any special requirements or requests?"></textarea>
        </div>
      </div>
</body>
